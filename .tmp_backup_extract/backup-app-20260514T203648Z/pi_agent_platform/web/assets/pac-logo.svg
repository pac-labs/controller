<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-labelledby="title desc">
  <title id="title">PAC logo</title>
  <desc id="desc">Purple five-node orbit around PAC wordmark.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#08070d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="violet" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#c084fc"/>
      <stop offset="0.55" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="word" x1="0" x2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f4f1ff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="260" rx="18" fill="#08070d"/>
  <ellipse cx="320" cy="128" rx="230" ry="110" fill="url(#glow)"/>
  <g fill="none" stroke="url(#violet)" stroke-width="9" stroke-linecap="square" opacity="0.92" filter="url(#softGlow)">
    <path d="M238 55 L320 28 L402 55"/>
    <path d="M402 55 L455 128 L422 212"/>
    <path d="M422 212 L218 212"/>
    <path d="M218 212 L185 128 L238 55"/>
  </g>
  <g filter="url(#softGlow)">
    <g fill="#08070d" stroke="url(#violet)" stroke-width="8">
      <circle cx="320" cy="28" r="26"/><circle cx="455" cy="128" r="26"/><circle cx="422" cy="212" r="26"/><circle cx="218" cy="212" r="26"/><circle cx="185" cy="128" r="26"/>
    </g>
    <g fill="#c084fc">
      <circle cx="320" cy="28" r="13"/><circle cx="455" cy="128" r="13"/><circle cx="422" cy="212" r="13"/><circle cx="218" cy="212" r="13"/><circle cx="185" cy="128" r="13"/>
    </g>
  </g>
  <g fill="url(#word)" filter="url(#softGlow)">
    <path d="M150 111h72c22 0 36 13 36 32s-14 32-36 32h-47v35h-25v-99zm25 23v18h45c8 0 13-3 13-9s-5-9-13-9h-45z"/>
    <path d="M307 111h27l61 99h-30l-44-74-44 74h-30l60-99z"/>
    <path d="M407 111h85v23h-82c-15 0-26 11-26 26s11 27 26 27h82v23h-85c-29 0-50-21-50-50s21-49 50-49z"/>
  </g>
</svg>