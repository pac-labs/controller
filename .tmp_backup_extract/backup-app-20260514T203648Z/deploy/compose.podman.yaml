services:
  pi-agent:
    build:
      context: ..
      dockerfile: deploy/Containerfile
    image: pi-agent-platform:stage3
    ports:
      - "443:443"
    volumes:
      - ../config/config.yaml:/app/config/config.yaml:rw,Z
      - pi-agent-data:/app/data:Z
      - pi-agent-workspaces:/tmp/pi-agent-workspaces:Z
    restart: unless-stopped

volumes:
  pi-agent-data: {}
  pi-agent-workspaces: {}
