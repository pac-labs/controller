services:
  traefik:
    image: traefik:v3.2
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
      - ./traefik:/etc/traefik/dynamic:ro
    restart: unless-stopped

  pi-agent:
    build:
      context: ..
      dockerfile: deploy/Containerfile
    image: pi-agent-platform:stage3
    environment:
      - PI_AGENT_HOSTNAME=${PI_AGENT_HOSTNAME:?set PI_AGENT_HOSTNAME}
    volumes:
      - ../config/config.yaml:/app/config/config.yaml:rw
      - pi-agent-data:/app/data
      - pi-agent-workspaces:/tmp/pi-agent-workspaces
    labels:
      - traefik.enable=true
      - traefik.http.routers.pi-agent.rule=Host(`${PI_AGENT_HOSTNAME}`)
      - traefik.http.routers.pi-agent.entrypoints=websecure
      - traefik.http.routers.pi-agent.tls.certresolver=letsencrypt
      - traefik.http.routers.pi-agent-http.rule=Host(`${PI_AGENT_HOSTNAME}`)
      - traefik.http.routers.pi-agent-http.entrypoints=web
      - traefik.http.routers.pi-agent-http.middlewares=redirect-to-https@file
      - traefik.http.services.pi-agent.loadbalancer.server.port=443
    restart: unless-stopped

volumes:
  traefik-letsencrypt: {}
  pi-agent-data: {}
  pi-agent-workspaces: {}
