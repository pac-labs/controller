name: Apply PAC diff PR

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    branches:
      - main
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number containing a .pac/diffs/*.diff file. Leave empty only when exactly one open PR has label pac-apply-diff."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: read
  issues: write

concurrency:
  group: pac-apply-diff-${{ github.event.pull_request.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  apply-diff:
    name: Validate and roll out supplied diff
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_target' &&
       contains(github.event.pull_request.labels.*.name, 'pac-apply-diff') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association))
    steps:
      - name: Resolve PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            async function allowedPr(pr) {
              const allowedAuthor = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(pr.author_association);
              const hasLabel = pr.labels.some(label => label.name === 'pac-apply-diff');
              return allowedAuthor && hasLabel && pr.base.ref === 'main';
            }

            let prNumber = 0;
            if (context.eventName === 'pull_request_target') {
              prNumber = Number(context.payload.pull_request?.number || 0);
            } else {
              const input = core.getInput('pr_number', { required: false }).trim();
              if (input) {
                prNumber = Number(input);
              } else {
                const { data: pulls } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  base: 'main',
                  per_page: 100,
                });
                const candidates = [];
                for (const candidate of pulls) {
                  if (await allowedPr(candidate)) {
                    candidates.push(candidate);
                  }
                }
                if (candidates.length === 1) {
                  prNumber = candidates[0].number;
                } else {
                  core.setFailed(
                    `Manual run needs pr_number, or exactly one open main-target PR with label pac-apply-diff from OWNER/MEMBER/COLLABORATOR. Found ${candidates.length}.`
                  );
                  return;
                }
              }
            }

            if (!Number.isInteger(prNumber) || prNumber < 1) {
              core.setFailed(`Invalid PR number: ${prNumber}. For manual runs, fill the pr_number input.`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(pr.author_association);
            const hasLabel = pr.labels.some(label => label.name === 'pac-apply-diff');
            if (!allowed) {
              core.setFailed(`PR author association ${pr.author_association} is not allowed to apply diffs.`);
              return;
            }
            if (!hasLabel) {
              core.setFailed('PR must have label pac-apply-diff.');
              return;
            }
            if (pr.base.ref !== 'main') {
              core.setFailed(`PR base must be main, not ${pr.base.ref}.`);
              return;
            }
            core.setOutput('number', String(pr.number));
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('title', pr.title.replace(/[\r\n]+/g, ' '));

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: controller
          token: ${{ secrets.push_token || github.token }}

      - name: Checkout PR diff source
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_sha }}
          path: incoming
          fetch-depth: 1

      - name: Select supplied diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t diffs < <(find incoming/.pac/diffs -maxdepth 1 -type f \( -name '*.diff' -o -name '*.patch' \) 2>/dev/null | sort)
          if [ "${#diffs[@]}" -ne 1 ]; then
            echo "Expected exactly one diff file under .pac/diffs/; found ${#diffs[@]}." >&2
            printf '%s\n' "${diffs[@]}" >&2
            exit 1
          fi
          diff_path="${diffs[0]}"
          echo "path=$diff_path" >> "$GITHUB_OUTPUT"
          echo "Selected $diff_path"

      - name: Guard diff scope
        shell: bash
        run: |
          set -euo pipefail
          python3 controller/scripts/validate-pac-diff.py "${{ steps.diff.outputs.path }}"

      - name: Apply diff to main checkout
        shell: bash
        working-directory: controller
        run: |
          set -euo pipefail
          git apply --check --whitespace=fix "${{ github.workspace }}/${{ steps.diff.outputs.path }}"
          git apply --whitespace=fix "${{ github.workspace }}/${{ steps.diff.outputs.path }}"

      - name: Validate applied tree
        shell: bash
        working-directory: controller
        run: |
          set -euo pipefail
          python3 -m compileall -q pi_agent_platform scripts
          if command -v node >/dev/null 2>&1; then
            node --check pi_agent_platform/web/app.js
          fi
          python3 scripts/generate-pac-release.py --version "$(tr -d '[:space:]' < VERSION)"
          unzip -t dist/pac-full.zip
          unzip -t dist/pac-patch.zip

      - name: Commit and push to main
        shell: bash
        working-directory: controller
        run: |
          set -euo pipefail
          if git diff --quiet -- .; then
            echo "No changes after applying diff."
            exit 0
          fi
          git config user.name "pac-sync[bot]"
          git config user.email "pac-sync[bot]@users.noreply.github.com"
          git add .
          git commit -m "Apply PAC diff from PR #${{ steps.pr.outputs.number }}" -m "${{ steps.pr.outputs.title }}"
          git push origin HEAD:main

      - name: Comment on PR
        if: always() && steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            if (!prNumber) return;
            const status = '${{ job.status }}';
            const body = status === 'success'
              ? 'PAC diff workflow applied the supplied diff to `main` and pushed the result.'
              : 'PAC diff workflow failed. Check the workflow logs for validation or apply errors.';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
