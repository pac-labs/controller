name: Validate and release supplied PAC diff

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [main]
    paths:
      - ".pac/diffs/v*.diff"
      - ".pac/diffs/v*.patch"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number containing .pac/diffs/vX.Y.Z.diff"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read
  issues: read

concurrency:
  group: pac-release-diff
  cancel-in-progress: false

jobs:
  release-from-diff:
    name: Validate supplied diff and create release tag
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.push_token || secrets.GITHUB_TOKEN }}
          script: |
            const rawInput = context.payload?.inputs?.pr_number || '';
            const prNumber = context.eventName === 'workflow_dispatch'
              ? Number(String(rawInput).trim())
              : context.payload.pull_request.number;
            if (!Number.isInteger(prNumber) || prNumber < 1) {
              core.setFailed(`Invalid PR number: ${rawInput || prNumber}. Manual runs must provide the numeric PR number.`);
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const hasLabel = pr.labels.some(label => label.name === 'pac-apply-diff');
            if (!hasLabel) {
              core.setFailed('PR must have label pac-apply-diff.');
              return;
            }
            if (pr.base.ref !== 'main') {
              core.setFailed(`PR base must be main, got ${pr.base.ref}.`);
              return;
            }
            core.setOutput('number', String(pr.number));
            core.setOutput('head_repo', pr.head.repo.full_name);
            core.setOutput('head_ref', pr.head.ref);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('title', pr.title.replace(/[\r\n]+/g, ' '));

      - name: Checkout controller main
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: main
          path: controller
          token: ${{ secrets.push_token || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout incoming PR
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          path: incoming
          token: ${{ secrets.push_token || secrets.GITHUB_TOKEN }}

      - name: Locate versioned supplied diff
        id: diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t diffs < <(find incoming/.pac/diffs -maxdepth 1 -type f \( -name 'v*.diff' -o -name 'v*.patch' \) | sort)
          if [ "${#diffs[@]}" -ne 1 ]; then
            echo "Expected exactly one versioned diff under .pac/diffs, named like v1.0.100.diff. Found ${#diffs[@]}." >&2
            printf '%s\n' "${diffs[@]}" >&2 || true
            exit 1
          fi
          diff_file="${diffs[0]}"
          base="$(basename "$diff_file")"
          version="${base%.*}"
          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Diff filename must be vMAJOR.MINOR.PATCH.diff or .patch, got: $base" >&2
            exit 1
          fi
          echo "path=$diff_file" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_branch=pac-release/$version" >> "$GITHUB_OUTPUT"

      - name: Reject binary/generated artifacts early
        shell: bash
        run: |
          set -euo pipefail
          diff_file='${{ steps.diff.outputs.path }}'
          if grep -Eq '^(GIT binary patch|Binary files |literal [0-9]+$|delta [0-9]+$)' "$diff_file"; then
            cat >&2 <<'EOF'
          The supplied diff contains binary patch sections.

          PAC release diffs are source-only. Do not include generated release assets, zip files,
          screenshots, sqlite/db files, compiled binaries, or other binary artifacts in .pac/diffs.

          Regenerate the diff from source changes only, for example:
            git diff --no-binary main...HEAD > .pac/diffs/v1.0.100.diff

          GitHub will build pac-full.zip, pac-patch.zip, manifests, and package zips from the
          release tag after the source diff is validated.
          EOF
            exit 1
          fi

      - name: Validate supplied diff
        shell: bash
        run: |
          set -euo pipefail
          python3 controller/scripts/validate-pac-diff.py '${{ steps.diff.outputs.path }}'

      - name: Apply diff to clean main checkout
        shell: bash
        working-directory: controller
        run: |
          set -euo pipefail
          git apply --check "../${{ steps.diff.outputs.path }}"
          git apply "../${{ steps.diff.outputs.path }}"

      - name: Inject release version markers
        shell: bash
        working-directory: controller
        run: |
          set -euo pipefail
          version='${{ steps.diff.outputs.version }}'
          plain="${version#v}"
          printf '%s\n' "$plain" > VERSION
          cat > VERSION_CURRENT.md <<EOF
          # PAC Version

          Current release: $plain
          EOF

      - name: Build inline changelog body
        id: changelog
        shell: bash
        working-directory: controller
        run: |
          set -euo pipefail
          version='${{ steps.diff.outputs.version }}'
          plain="${version#v}"
          body="/tmp/pac-release-body.md"
          {
            echo "# PAC $version"
            echo
            echo "Applied from PR #${{ steps.pr.outputs.number }}: ${{ steps.pr.outputs.title }}"
            echo
            echo "## Changelog"
            echo
          } > "$body"

          if [ -f PAC_CHANGELOG.md ]; then
            awk -v ver="$version" -v plain="$plain" '
              BEGIN { capture=0; found=0 }
              /^##[[:space:]]+/ {
                if (capture) exit
                capture = ($0 ~ ver || $0 ~ plain)
                if (capture) found=1
              }
              capture { print }
              END { if (!found) exit 2 }
            ' PAC_CHANGELOG.md >> "$body" || true
          fi

          if [ -f PAC_CHANGELOG.json ]; then
            python3 - <<'PY' >> "$body" || true
          import json, os
          version = os.environ.get('PAC_RELEASE_VERSION', '').lstrip('v')
          with open('PAC_CHANGELOG.json', 'r', encoding='utf-8') as fh:
              data = json.load(fh)
          entries = data.get('versions') or data.get('releases') or data if isinstance(data, list) else []
          if isinstance(entries, dict):
              entries = [{'version': k, **(v if isinstance(v, dict) else {'changes': v})} for k, v in entries.items()]
          for item in entries:
              if str(item.get('version', '')).lstrip('v') != version:
                  continue
              changes = item.get('changes') or item.get('items') or []
              if isinstance(changes, str):
                  print(changes)
              else:
                  for change in changes:
                      print(f"- {change}")
              break
          PY
          fi

          if ! grep -q '^- ' "$body" && ! grep -q '^###' "$body"; then
            {
              echo "- Source changes supplied by the versioned diff file."
              echo
              echo "## Changed files"
              git diff --name-only HEAD | sed 's/^/- /'
            } >> "$body"
          fi

          echo "body_path=$body" >> "$GITHUB_OUTPUT"
        env:
          PAC_RELEASE_VERSION: ${{ steps.diff.outputs.version }}

      - name: Commit release branch and tag
        shell: bash
        working-directory: controller
        run: |
          set -euo pipefail
          version='${{ steps.diff.outputs.version }}'
          branch='${{ steps.diff.outputs.release_branch }}'

          if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
            echo "Release tag $version already exists." >&2
            exit 1
          fi

          git config user.name "pac-labs-bot"
          git config user.email "pac-labs-bot@users.noreply.github.com"
          git add -A
          git commit -m "Release $version from PAC diff PR #${{ steps.pr.outputs.number }}"
          git branch -f "$branch"
          git tag -a "$version" -F '${{ steps.changelog.outputs.body_path }}'
          git push origin "$branch"
          git push origin "$version"

      - name: Create GitHub release with inline changelog
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.push_token || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const tag = '${{ steps.diff.outputs.version }}';
            const body = fs.readFileSync('${{ steps.changelog.outputs.body_path }}', 'utf8');
            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `PAC ${tag}`,
                body,
                draft: false,
                prerelease: false,
              });
            } catch (error) {
              if (error.status === 422) {
                core.warning(`Release for ${tag} may already exist; updating release body instead.`);
                const { data: release } = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag,
                });
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                  name: `PAC ${tag}`,
                  body,
                  draft: false,
                  prerelease: false,
                });
              } else {
                throw error;
              }
            }

      - name: Trigger release asset workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.push_token || secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.diff.outputs.version }}';
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'release.yml',
                ref: tag,
                inputs: { release_tag: tag },
              });
              core.notice(`Triggered release.yml for ${tag}.`);
            } catch (error) {
              core.warning(`Could not dispatch release.yml directly: ${error.message}. If release.yml also runs on tag push, it should already be queued.`);
            }
