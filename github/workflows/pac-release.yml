name: PAC release current main

on:
  push:
    branches: [main]
    paths-ignore:
      - 'VERSION'
      - 'VERSION_CURRENT.md'
      - 'PAC_CHANGELOG.json'
      - 'pyproject.toml'
      - 'MANIFEST.json'
      - 'dist/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release. Empty means bump patch from latest v* tag."
        required: false
        type: string
      create_tag:
        description: "Create/push v<version> tag when missing"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: pac-release-main
  cancel-in-progress: false

jobs:
  release-main:
    name: Release current main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN || github.token }}

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          requested="${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}"
          if [ -n "$requested" ]; then
            version="$requested"
          else
            latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"
            if [ -z "$latest" ]; then
              base="$(tr -d '[:space:]' < VERSION 2>/dev/null || echo '1.0.0')"
              IFS=. read -r major minor patch <<< "$base"
              version="${major}.${minor}.$((patch + 1))"
            else
              IFS=. read -r major minor patch <<< "${latest#v}"
              version="${major}.${minor}.$((patch + 1))"
            fi
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid PAC version: $version" >&2
            exit 1
          fi
          tag="v$version"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Write release version markers
        shell: bash
        run: |
          set -euo pipefail
          version='${{ steps.version.outputs.version }}'
          printf '%s\n' "$version" > VERSION
          printf '# PAC Version\n\nCurrent release: %s\n' "$version" > VERSION_CURRENT.md
          python3 - "$version" <<'PY'
          from pathlib import Path
          import re
          import sys

          version = sys.argv[1]
          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          updated = re.sub(r'(?m)^version\s*=\s*"[^"]+"', f'version = "{version}"', text, count=1)
          if updated == text:
              raise SystemExit("Could not update pyproject.toml version")
          path.write_text(updated, encoding="utf-8")
          PY

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Compile release binaries
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/compile-release-binaries.py

      - name: Validate binary-first release pipeline
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate-release-binary-pipeline.py

      - name: Generate release artifacts
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate-pac-release.py --version '${{ steps.version.outputs.version }}'
          unzip -t dist/pac-full.zip
          unzip -t dist/pac-patch.zip
          unzip -t dist/pac-packages-seed.zip
          unzip -t dist/pac-binaries.zip
          python3 - <<'PY'
          import zipfile
          for name in ('dist/pac-full.zip', 'dist/pac-patch.zip'):
              with zipfile.ZipFile(name) as zf:
                  bundled = [entry for entry in zf.namelist() if entry.startswith('release-binaries/')]
              if bundled:
                  raise SystemExit(f'{name} unexpectedly bundled release binaries')
          PY

      - name: Commit release metadata to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "pac-sync[bot]"
          git config user.email "pac-sync[bot]@users.noreply.github.com"
          git add VERSION VERSION_CURRENT.md PAC_CHANGELOG.json pyproject.toml
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "Release ${{ steps.version.outputs.tag }}"
            git push origin HEAD:main
          fi

      - name: Create tag
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.create_tag != false }}
        shell: bash
        run: |
          set -euo pipefail
          tag='${{ steps.version.outputs.tag }}'
          git fetch origin main --tags
          git checkout main
          git pull --ff-only origin main
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
          else
            git config user.name "pac-sync[bot]"
            git config user.email "pac-sync[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "PAC $tag"
            git push origin "$tag"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PAC ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/pac-full.zip
            dist/pac-patch.zip
            dist/pac-packages-seed.zip
            dist/pac-binaries.zip
            dist/RELEASE_BINARIES.json
            dist/pac-endpoint-*
            dist/pacctl-*
            dist/PAC_RELEASE_MANIFEST.json
            dist/PAC_UPDATE_DIFF.diff

      - name: Require packages repository token
        shell: bash
        env:
          PAC_PACKAGES_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PAC_PACKAGES_TOKEN:-}" ]; then
            echo "Missing required secret PUSH_TOKEN. It must allow checkout and push to pac-labs/packages." >&2
            exit 1
          fi

      - name: Checkout packages repository
        uses: actions/checkout@v4
        with:
          repository: pac-labs/packages
          token: ${{ secrets.PUSH_TOKEN }}
          path: packages
          fetch-depth: 0

      - name: Sync packages repository
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate-package-repo.py --source . --out packages --version '${{ steps.version.outputs.version }}'
          cd packages
          if git diff --quiet -- .; then
            echo "No package changes to publish."
            exit 0
          fi
          git config user.name "pac-sync[bot]"
          git config user.email "pac-sync[bot]@users.noreply.github.com"
          git add .
          git commit -m "Sync PAC packages for ${{ steps.version.outputs.tag }}"
          git push
