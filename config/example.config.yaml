server:
  host: 0.0.0.0
  port: 443
  public_url: https://admin.pac.local
  data_dir: ~/.pacp
  default_workspace_root: ~/.pacp/workspaces

tls:
  enabled: true
  ca_days: 10950
  server_days: 825
  ca_cert_file: ~/.pacp/config/tls/pac-root-ca.crt
  ca_key_file: ~/.pacp/config/tls/private/pac-root-ca.key
  server_cert_file: ~/.pacp/config/tls/pac-server.crt
  server_key_file: ~/.pacp/config/tls/private/pac-server.key
  details_file: ~/.pacp/config/tls/ca-details.yaml
  install_ca_into_system: true
  subject: /CN=PAC Local Root CA/O=PAC/C=NL
  server_subject: /CN=localhost/O=PAC/C=NL
  sans:
    - DNS:localhost
    - DNS:admin.pac.local
    - DNS:pac.local
    - IP:127.0.0.1
    - IP:::1

mdns:
  enabled: true
  hostname: admin.pac.local
  service_name: PAC Admin
  service_type: _https._tcp.local.

service:
  mode: user
  name: pacp
  preferred_port: 443
  fallback_port: 8443
  allow_privileged_port: true

auth:
  enabled: false
  mode: dev-token
  dev_token: change-me
  token_ttl_hours: 720

providers:
  openai:
    type: openai
    api_key_env: OPENAI_API_KEY
    notes: Remote OpenAI API provider.
  lmstudio-desktop:
    type: lmstudio
    base_url: http://host.containers.internal:1234/v1
    notes: LM Studio OpenAI-compatible server on your desktop. On Linux host networking, use the host LAN IP if needed.
  ollama-local:
    type: ollama
    base_url: http://host.containers.internal:11434
    notes: Ollama on host or another machine.
  vllm-gpu-host:
    type: vllm
    base_url: http://gpu-host.lan:8000/v1
    notes: vLLM OpenAI-compatible endpoint on a GPU host.

models: {}

context_profiles:
  tiny-4k:
    budget_tokens: 4096
    reserve_output_tokens: 768
    history_tokens: 1400
    file_context_tokens: 1200
    summarization: rolling
    compaction_threshold: 0.75
    batch_chunk_tokens: 700
    batch_overlap_tokens: 60
  low:
    budget_tokens: 16000
    reserve_output_tokens: 2048
    history_tokens: 4096
    file_context_tokens: 8192
    summarization: rolling
    compaction_threshold: 0.82
    batch_chunk_tokens: 1200
    batch_overlap_tokens: 80
  medium:
    budget_tokens: 64000
    reserve_output_tokens: 8192
    history_tokens: 16000
    file_context_tokens: 32000
    summarization: rolling
    compaction_threshold: 0.82
    batch_chunk_tokens: 1600
    batch_overlap_tokens: 100
  high:
    budget_tokens: 131072
    reserve_output_tokens: 12000
    history_tokens: 32000
    file_context_tokens: 80000
  max:
    budget_tokens: 200000
    reserve_output_tokens: 16000
    history_tokens: 50000
    file_context_tokens: 120000

tool_packages:
  development:
    enabled: true
    description: Required endpoint binaries for agent code and repository work.
    tools: [ripgrep, fd, jq, git, delta, bat, just, shell, web_fetch]
  operations:
    enabled: true
    description: Operational binaries for clusters and containers.
    tools: [openshift, podman, shell]

plugins:
  python-data-retriever:
    enabled: true
    kind: python
    description: Run documented Python helpers that retrieve or reshape data for an agent.
    documentation: Store script purpose, inputs, outputs and safety notes here.
    requires_tools: [shell]
  slash-command-router:
    enabled: true
    kind: docs
    description: Routes session /commands to endpoint tools or agent skills.
    documentation: /command <tool> [args], /rg, /fd, /jq, /git, /delta, /bat, /bad, /just, /compact and /subagent. Endpoint tool commands require the session locked endpoint to have the corresponding binary.
    requires_tools: [ripgrep, fd, jq, git, delta, bat, just]
  context-compact:
    enabled: true
    kind: docs
    description: Agent skill used by /compact to request session context compaction.
    documentation: Controller-side skill; does not require an endpoint binary.
    requires_tools: []
  subagent-task:
    enabled: true
    kind: docs
    description: Agent skill used by /subagent to spawn a scoped one-purpose task on the session model/profile.
    documentation: Controller-side skill; may use endpoint tools through the locked session endpoint when needed.
    requires_tools: []

tools:
  shell:
    enabled: true
    description: Local shell binary access on an endpoint.
    package: development
    approval_required_patterns:
      - rm *
      - sudo *
      - oc apply *
      - kubectl apply *
      - kubectl delete *
      - git push *
  ripgrep:
    enabled: true
    package: development
    description: Required endpoint search tool.
    binaries: [rg]
    install_hint: Install ripgrep.
  fd:
    enabled: true
    package: development
    description: Required endpoint file discovery tool.
    binaries: [fd]
    install_hint: Install fd-find/fd.
  jq:
    enabled: true
    package: development
    description: Required endpoint JSON processing tool.
    binaries: [jq]
    install_hint: Install jq.
  git:
    enabled: true
    package: development
    description: Required endpoint repository tool.
    binaries: [git]
  delta:
    enabled: true
    package: development
    description: Required endpoint diff viewer for agent-friendly git output.
    binaries: [delta]
    install_hint: Install git-delta.
  bat:
    enabled: true
    package: development
    description: Required endpoint file preview tool; Debian may provide it as batcat.
    binaries: [bat, batcat]
    install_hint: Install bat.
  just:
    enabled: true
    package: development
    description: Required endpoint project command runner.
    binaries: [just]
    install_hint: Install just.
  openshift:
    enabled: true
    package: operations
    binaries: [oc, kubectl, helm, kustomize]
  podman:
    enabled: true
    package: operations
    socket: /run/podman/podman.sock
    binaries: [podman]
  web_search:
    enabled: true
    description: Text-only web search using DuckDuckGo HTML; replace later with SearXNG or paid search APIs.
  web_fetch:
    enabled: true
    package: development
    description: Fetch a URL and return cleaned rendered text via lynx/links2/w3m or built-in HTML cleanup.
  consult_model:
    enabled: true
    description: Allow the internal PAC agent to consult one or more configured models for planning or review help.
  remote_memory:
    enabled: true
    description: Allow the internal PAC agent and pacctl to retrieve PAC RAM profile, user, and workspace memory from the controller.
  internet:
    enabled: true
    description: Meta-tool enabling both web_search and web_fetch.
  artifacts:
    enabled: true
    description: Save/list downloadable task artifacts.

permission_profiles:
  read-only:
    shell: deny
    file_read: allow
    file_write: deny
    git_push: deny
    network: deny
    cluster_write: deny
    secrets: deny
    dangerous: deny
  ask-first:
    shell: ask
    file_read: allow
    file_write: ask
    git_push: ask
    network: allow
    cluster_write: ask
    secrets: ask
    dangerous: deny
    command_ask_patterns:
      - oc *
      - kubectl *
      - podman *
      - docker *
      - git push *
  full-dev:
    shell: allow
    file_read: allow
    file_write: allow
    git_push: ask
    network: allow
    cluster_write: ask
    secrets: ask
    dangerous: deny
    command_deny_patterns:
      - rm -rf /*
      - mkfs*
      - dd if=*

  full-control:
    shell: allow
    file_read: allow
    file_write: allow
    git_push: allow
    network: allow
    cluster_write: allow
    secrets: allow
    dangerous: allow
    command_deny_patterns: []
    command_ask_patterns: []

agent_profiles:
  main-pi-dev:
    description: Main pi.dev profile for the PAC controller runtime. Select its model in Settings.
    model: __pac_model_not_selected__
    context_mode: high
    context_profile: high
    permission_profile: ask-first
    tools: [shell, git, ripgrep, fd, jq, podman, artifacts]
    system_prompt: >-
      You are the main pi.dev runtime for PAC. Use the PAC controller workspace as the source of truth,
      keep changes scoped to the requested task, and surface build/update diagnostics clearly.
    max_runtime_minutes: 120

workspaces:
  agent-control:
    description: Agent control workspace: the PAC controller application/source tree used by the main pi.dev runtime.
    type: local
    path: null
    default_agent_profile: main-pi-dev
    endpoint_id: controller-pi-dev
    endpoint_selector: controller
    runtime: local
    ephemeral: false
    is_default: true
  scratch:
    description: Default local workspace
    type: local
    endpoint_id: local-PAC
    is_default: true

runtime:
  mode: local
  command_timeout_seconds: 300
  max_task_seconds: 3600


controller_harness:
  enabled: true
  runtime: pi.dev
  deployment_mode: controller
  wrapper: PAC controller wrapper
  session_name: PAC controller pi.dev
  workspace_profile: agent-control
  agent_profile: main-pi-dev
  permission_profile: ask-first
  context_mode: high
  runner_id: controller-pi-dev
  auto_create_session: true
  keep_single_active_session: true
  expose_platform_tools: true
